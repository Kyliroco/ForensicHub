# ============================================================
# ForensicHub - Run (Inference) Configuration
# ============================================================
# This config runs a trained model on images and saves outputs.
# No metrics are computed, no shuffle, no training.
#
# Usage:
#   forhub run ./example_run.yaml
# ============================================================

# DDP
gpus: "0"
flag: run

# Log directory (used for stdout/stderr logs)
log_dir: "./log/run_inference"

# Task - what does the model predict?
if_predict_label: false
if_predict_mask: true

# ---- Output settings ----
# Common base directory for all dataset outputs.
# Each dataset's output_dir is appended to this path.
# Example: output_base_dir + output_dir => /home/user/data/fcd
output_base_dir: /home/user/data

# Optional global threshold: zero out predicted pixels below this value.
# Can also be set per-dataset (see run_dataset below).
# threshold: 0.5

# Optional score threshold: separate inference results into two folders
# (above_score/ and below_score/) based on the prediction score.
# For label predictions, score = pred_label value.
# For mask predictions, score = mean pixel value (or pred_label if available).
# A detailed score_details.csv is always saved with per-image scores.
# Can also be set per-dataset.
# score_threshold: 0.5

# ---- Model ----
model:
  name: FFDN
  init_config:
    weight_path: /path/to/convnext_small.pth

# ---- Checkpoint to load ----
# Single checkpoint file (not a directory like in test mode)
checkpoint_path: /path/to/checkpoint-best.pth

# ---- Datasets to run inference on ----
# Each dataset has:
#   - name: registry name of the dataset class
#   - dataset_name: identifier for logging
#   - output_dir: subdirectory under output_base_dir for this dataset's outputs
#   - threshold: (optional) per-dataset threshold override
#   - init_config: dataset-specific configuration
#
# If the dataset has labels, outputs will be separated into
# label_0/, label_1/, etc. subdirectories automatically.

run_dataset:
  # Document dataset with sliding window
  - name: SlidingWindowWrapper
    dataset_name: fcd
    output_dir: fcd
    init_config:
      patch_width: 512
      patch_height: 512
      overlapping: 0.5
      merge_mode: gaussian    # gaussian, mean, max, min, overwrite
      dataset:
        name: DocDataset
        init_config:
          get_dct_qtb: true
          path: /path/to/FCD

  # Another document dataset
  - name: SlidingWindowWrapper
    dataset_name: scd
    output_dir: scd
    init_config:
      patch_width: 512
      patch_height: 512
      overlapping: 0.5
      merge_mode: gaussian
      dataset:
        name: DocDataset
        init_config:
          get_dct_qtb: true
          path: /path/to/SCD

  # Dataset without sliding window
  - name: DocDataset
    dataset_name: rtm
    output_dir: rtm
    # threshold: 0.3    # per-dataset pixel threshold override
    # score_threshold: 0.4  # per-dataset score threshold override
    # Per-dataset evaluator override (optional):
    # evaluator:
    #   - name: ImageAP
    #   - name: ImageMCC
    #     init_config:
    #       threshold: 0.5
    init_config:
      get_dct_qtb: true
      path: /path/to/RTM

# ---- Transform (optional) ----
# Transforms are applied to images before inference.
# Useful to test the effect of different transforms on output.
# If omitted, no transform is applied.
transform:
  name: DocTransform
  init_config:
    norm_type: image_net
    compression_type: cv

# ---- Evaluators (optional) ----
# Evaluators compute metrics (AP, MCC, TPR, TNR, etc.) on inference results.
# Requires ground truth labels in the dataset.
# Results are saved to evaluator_results.json in each dataset's output dir.
# evaluator:
#   - name: ImageAP
#   - name: ImageMCC
#     init_config:
#       threshold: 0.5
#   - name: ImageTPR
#     init_config:
#       threshold: 0.5

# ---- Inference settings ----
batch_size: 8
no_model_eval: false

# Device
device: "cuda"
seed: 42
num_workers: 8
pin_mem: true

# Distributed
dist_on_itp: false
dist_url: "env://"
