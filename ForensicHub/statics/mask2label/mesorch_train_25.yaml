# DDP
gpus: "2,3"
flag: train

# Log
log_dir: "./log/mesorch_25"

# Task
if_predict_label: false
if_predict_mask: true

# Model
model:
  name: Mesorch
  init_config:
    conv_pretrain: true
    seg_pretrain_path: /home/59435a/Forensic_hub/weight/mit_b3.pth
    pos_weight: 1

# Train dataset
train_dataset:
  name: DocDataset
  dataset_name: BigDatasetTrain
  init_config:
    path: /home/59435a/Forensic_hub/data/dataset_pub_25
    suffix_img: 
        - ".png"
        - ".jpeg"
        - ".jpg"
