# DDP
gpus: "0,1"
flag: train

# Log
log_dir: "./log/trufor_iou_train"

# Task
if_predict_label: false
if_predict_mask: true

# Model
model:
  name: Trufor
  init_config:
    np_pretrain_weights: /home/59435a/Forensic_hub/weight/noiseprint++.th
    mit_b2_pretrain_weights: /home/59435a/Forensic_hub/weight/mit_b2.pth
    config_path: /home/59435a/Forensic_hub/weight/trufor.yaml

# Train dataset (single or list — lists are concatenated and shuffled)
train_dataset:
  - name: DocDataset
    dataset_name: DocTamperData_train
    init_config:
      path: /home/59435a/data_registry/data_process_out/doctamper_trainingset
      get_dct_qtb: True
  - name: DocDataset
    dataset_name: DocTamperData_scd_train
    init_config:
      path: /home/59435a/data_registry/data_process_out/scd
      get_dct_qtb: True

#  Test dataset (one or many)
#  Each test dataset can optionally specify its own evaluators.
#  If no 'evaluator' key is present, the global evaluator list is used.
test_dataset:
  - name: DocDataset
    dataset_name: DocTamperData_test
    # This dataset has alterations => apply IOU + F1
    evaluator:
      - name: PixelIOU
        init_config:
          threshold: 0.5
      - name: PixelF1
        init_config:
          threshold: 0.5
    init_config:
      path: /home/59435a/data_registry/data_process_out/doctamper_testingset
      get_dct_qtb: True
  - name: DocDataset
    dataset_name: DocTamperData_scd
    # This dataset has no alteration => only F1, no IOU (would always be 0)
    evaluator:
      - name: PixelF1
        init_config:
          threshold: 0.5
    init_config:
      path: /home/59435a/data_registry/data_process_out/scd
      get_dct_qtb: True
  - name: DocDataset
    dataset_name: DocTamperData_fcd
    # Uses global evaluator (no per-dataset override)
    init_config:
      path: /home/59435a/data_registry/data_process_out/fcd
      get_dct_qtb: True

# Transform
transform:
  name: DocTransform
  init_config:
    norm_type: image_net

# Evaluators
evaluator:
  # - name: ImageF1
  #   init_config:
  #     threshold: 0.5
  - name: PixelIOU
    init_config:
      threshold: 0.5
  - name: PixelF1
    init_config:
      threshold: 0.5

# Training related
batch_size: 10 # doit être plus petit que la taille du dataset quand il est multiplié par le nombre de processus
test_batch_size: 10
epochs: 100
accum_iter: 1
record_epoch: 1  # Save the best only after record epoch.

# Test related
no_model_eval: false
test_period: 1

# Logging & TensorBoard
log_per_epoch_count: 20

# DDP & AMP settings
find_unused_parameters: true
use_amp: false

# Optimizer parameters
weight_decay: 0.05
lr: 0.01
blr: 0.1
min_lr: 0.001
warmup_epochs: 1

# Device and training control
device: "cuda"
seed: 42
resume: ""
start_epoch: 0
num_workers: 8
pin_mem: true

# Distributed training parameters
# world_size: 1
# local_rank: -1
dist_on_itp: false
dist_url: "env://"

