# Transform
transform:
  name: DocTransform
  init_config:
    norm_type: image_net

# Evaluators
evaluator:
  # - name: ImageF1
  #   init_config:
  #     threshold: 0.5
  - name: PixelIOU
    init_config:
      threshold: 0.5
  - name: PixelF1
    init_config:
      threshold: 0.5

# Training related
batch_size: 10
test_batch_size: 14
epochs: 20
accum_iter: 1
record_epoch: 0  # Save the best only after record epoch.

# Test related
no_model_eval: false
test_period: 1

# Logging & TensorBoard
log_per_epoch_count: 10

# DDP & AMP settings
find_unused_parameters: true
use_amp: false

# Optimizer parameters
weight_decay: 0.05
lr: 0.0001
blr: 0.001
min_lr: 0.00001
warmup_epochs: 1

# Device and training control
device: "cuda"
seed: 42
resume: ""
start_epoch: 0
num_workers: 8
pin_mem: true

# Distributed training parameters
# world_size: 1
# local_rank: -1
dist_on_itp: false
dist_url: "env://"

