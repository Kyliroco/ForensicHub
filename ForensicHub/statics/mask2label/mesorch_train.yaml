# DDP
gpus: "2,3"
flag: train

# Log
log_dir: "./log/mesorch_df_train_2"

# Task
if_predict_label: false
if_predict_mask: true

# Model
model:
  name: Mesorch
  init_config:
    conv_pretrain: true
    seg_pretrain_path: /home/59435a/Forensic_hub/weight/mit_b3.pth

# Train dataset
train_dataset:
    name: DocDataset
    dataset_name: Bigdataset
    init_config:
      path: /home/59435a/Forensic_hub/data/big_dataset
      suffix_img: 
        - ".png"
        - ".jpeg"
        - ".jpg"

test_dataset:
# FCD
  - name: DocDataset
    dataset_name: fcd
    init_config:
      path: /home/59435a/Forensic_hub/data/big_test/FCD
  - name: DocDataset
    dataset_name: fcd_recompress
    init_config:
      path: /home/59435a/Forensic_hub/data/big_test/FCD_recompress
# FUNSD
  - name: DocDataset
    dataset_name: funsd
    init_config:
      path: /home/59435a/Forensic_hub/data/big_test/Funsd
      suffix_img: ".png"
  - name: DocDataset
    dataset_name: funsd_recompress
    init_config:
      path: /home/59435a/Forensic_hub/data/big_test/funsd_recompress
      suffix_img: ".png"
# Maif authentic
  - name: DocDataset
    dataset_name: Maif_authentic
    init_config:
      path: /home/59435a/Forensic_hub/data/big_test/Maif_authentic
  - name: DocDataset
    dataset_name: Maif_authentic_recompress
    init_config:
      path: /home/59435a/Forensic_hub/data/big_test/Maif_authentic_recompress
# Maif forged
  - name: DocDataset
    dataset_name: Maif_Forged
    init_config:
      path: /home/59435a/Forensic_hub/data/big_test/Maif_Forged
# SCD
  - name: DocDataset
    dataset_name: scd
    init_config:
      path: /home/59435a/Forensic_hub/data/big_test/SCD
  - name: DocDataset
    dataset_name: scd_recompress
    init_config:
      path: /home/59435a/Forensic_hub/data/big_test/SCD_recompress
# sroie
  - name: DocDataset
    dataset_name: sroie
    init_config:
      path: /home/59435a/Forensic_hub/data/big_test/Sroie
  - name: DocDataset
    dataset_name: sroie_recompress
    init_config:
      path: /home/59435a/Forensic_hub/data/big_test/Sroie_recompress
# Testingset
  - name: DocDataset
    dataset_name: DocTamperData_test
    init_config:
      path: /home/59435a/Forensic_hub/data/big_test/TestingSet
  - name: DocDataset
    dataset_name: DocTamperData_test_recompress
    init_config:
      path: /home/59435a/Forensic_hub/data/big_test/TestingSet_recompress



