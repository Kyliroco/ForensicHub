# DDP
gpus: "2,3"
flag: train

# Log
log_dir: "./log/mesorch_df_train_5"

# Task
if_predict_label: false
if_predict_mask: true

# Model
model:
  name: Mesorch
  init_config:
    conv_pretrain: true
    seg_pretrain_path: /home/59435a/Forensic_hub/weight/mit_b3.pth
    pos_weight: 1

# Train dataset
train_dataset:
  name: DocDataset
  dataset_name: BigDatasetTrain
  init_config:
    path: /home/59435a/Forensic_hub/data/dataset_pub_2
  # name: DocDataset
  # dataset_name: DocTamperData_fcd
  # init_config:
    # path: /home/59435a/Forensic_hub/data/Doctamper/FCD
test_dataset:
  # FCD
  - name: DocDataset
    dataset_name: fcd
    init_config:
      path: /home/59435a/Forensic_hub/data/dataset_pub_test_2/FCD
  - name: DocDataset
    dataset_name: fcd_recompress
    init_config:
      path: /home/59435a/Forensic_hub/data/dataset_pub_test_2/FCD_recompress
# FUNSD
  - name: DocDataset
    dataset_name: funsd
    init_config:
      path: /home/59435a/Forensic_hub/data/dataset_pub_test_2/Funsd
      suffix_img: ".png"
  - name: DocDataset
    dataset_name: funsd_recompress
    init_config:
      path: /home/59435a/Forensic_hub/data/dataset_pub_test_2/funsd_recompress
      suffix_img: ".png"
# Maif authentic
  - name: DocDataset
    dataset_name: Maif_authentic
    init_config:
      path: /home/59435a/Forensic_hub/data/dataset_pub_test_2/Maif_authentic
  - name: DocDataset
    dataset_name: Maif_authentic_recompress
    init_config:
      path: /home/59435a/Forensic_hub/data/dataset_pub_test_2/Maif_authentic_recompress
# Maif forged
  - name: DocDataset
    dataset_name: Maif_Forged
    init_config:
      path: /home/59435a/Forensic_hub/data/dataset_pub_test_2/Maif_Forged
# SCD
  - name: DocDataset
    dataset_name: scd
    init_config:
      path: /home/59435a/Forensic_hub/data/dataset_pub_test_2/SCD
  - name: DocDataset
    dataset_name: scd_recompress
    init_config:
      path: /home/59435a/Forensic_hub/data/dataset_pub_test_2/SCD_recompress
# sroie
  - name: DocDataset
    dataset_name: sroie
    init_config:
      path: /home/59435a/Forensic_hub/data/dataset_pub_test_2/Sroie
  - name: DocDataset
    dataset_name: sroie_recompress
    init_config:
      path: /home/59435a/Forensic_hub/data/dataset_pub_test_2/Sroie_recompress
# Testingset
  - name: DocDataset
    dataset_name: DocTamperData_test
    init_config:
      path: /home/59435a/Forensic_hub/data/dataset_pub_test_2/TestingSet
  - name: DocDataset
    dataset_name: DocTamperData_test_recompress
    init_config:
      path: /home/59435a/Forensic_hub/data/dataset_pub_test_2/TestingSet_recompress

# Transform
transform:
  name: DocTransform
  init_config:
    norm_type: image_net

# Evaluators
evaluator:
  # - name: ImageF1
  #   init_config:
  #     threshold: 0.5
  - name: PixelIOU
    init_config:
      threshold: 0.5
  - name: PixelF1
    init_config:
      threshold: 0.5

# Training related
batch_size: 10
test_batch_size: 14
epochs: 50
accum_iter: 1
record_epoch: 0  # Save the best only after record epoch.

# Test related
no_model_eval: false
test_period: 1

# Logging & TensorBoard
log_per_epoch_count: 20

# DDP & AMP settings
find_unused_parameters: true
use_amp: false

# Optimizer parameters
weight_decay: 0.05
lr: 0.0001
blr: 0.001
min_lr: 0.00001
warmup_epochs: 1

# Device and training control
device: "cuda"
seed: 42
resume: "/home/59435a/Forensic_hub/ForensicHub/log/mesorch_df_train_5/checkpoint-25.pth"
start_epoch: 26
num_workers: 8
pin_mem: true

# Distributed training parameters
# world_size: 1
# local_rank: -1
dist_on_itp: false
dist_url: "env://"

