      path: /home/59435a/Forensic_hub/data/dataset_pub_test/TestingSet_recompress

# Transform
transform:
  name: DocTransform
  init_config:
    norm_type: image_net
    luminance_path: /home/59435a/Forensic_hub/quantification_luminance.pkl
    chrominance_path: /home/59435a/Forensic_hub/quantification_chrominance.pkl
    compression_type: pillow

# Evaluators
evaluator:
  # - name: ImageF1
  #   init_config:
  #     threshold: 0.5
  - name: PixelIOU
    init_config:
      threshold: 0.5
  - name: PixelF1
    init_config:
      threshold: 0.5

# Training related
batch_size: 16
test_batch_size: 8
epochs: 50
accum_iter: 1
record_epoch: 0  # Save the best only after record epoch.

# Test related
no_model_eval: false
test_period: 1

# Logging & TensorBoard
log_per_epoch_count: 20

# DDP & AMP settings
find_unused_parameters: true
use_amp: true

# Optimizer parameters
opt: 'AdamW'
weight_decay: 0.05
lr: 1e-4
blr: 0.001
min_lr: 5e-7
warmup_epochs: 0

# Device and training control
device: "cuda"
seed: 42
resume: ""
start_epoch: 0
num_workers: 8
pin_mem: true

# Distributed training parameters
# world_size: 4
# local_rank: -1
dist_on_itp: false
dist_url: "env://"

