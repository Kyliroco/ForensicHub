# ADCD-Net Training Configuration
# Adaptive DCT-Guided Content Disentangling Network for Document Tampering Detection
# Reference: https://github.com/KAHIMWONG/ADCD-Net (ICCV 2025)

# DDP
gpus: "0,1,2,3"
flag: train

# Log
log_dir: "./log/doc_adcd_net_train"

# Task
if_predict_label: true
if_predict_mask: true

# Model
model:
  name: ADCDNet
  init_config:
    cls_n: 2
    loc_out_dim: 96
    rec_out_dim: 4
    dct_feat_dim: 256
    focal_in_dim: [192, 96, 96, 96]
    focal_out_dim: 32
    pp_scale_n: 4
    use_checkpoint: true 
    docres_ckpt_path: null  # Optional: path to pre-trained DocRes checkpoint
    ce_weight: 3.0
    rec_weight: 1.0
    focal_weight: 0.2
    norm_weight: 0.1

# Train dataset
train_dataset:
  # name: DocDataset
  # dataset_name: DocTamperData_train
  # init_config:
  #   path: /home/59435a/Forensic_hub/data/Doctamper/TrainingSet
  name: DocDataset
  dataset_name: DocTamperData_fcd
  init_config:
    path: /home/59435a/Forensic_hub/data/Doctamper/FCD

#  Test dataset (one or many)
test_dataset:
  - name: DocDataset
    dataset_name: DocTamperData_test
    init_config:
      path: /home/59435a/Forensic_hub/data/Doctamper/TestingSet
  - name: DocDataset
    dataset_name: DocTamperData_scd
    init_config:
      path: /home/59435a/Forensic_hub/data/Doctamper/SCD
  - name: DocDataset
    dataset_name: DocTamperData_fcd
    init_config:
      path: /home/59435a/Forensic_hub/data/Doctamper/FCD


# Transform
transform:
  name: DocTransform
  init_config:
    norm_type: image_net

# Post-processing function for DCT extraction
post_func_name: adcd_net

# Evaluators
evaluator:
  - name: PixelF1
    init_config:
      threshold: 0.5
  - name: PixelIOU
    init_config:
      threshold: 0.5

# Training related
batch_size: 1  # Per GPU, total = batch_size * num_gpus * accum_iter
test_batch_size: 4
epochs: 100
accum_iter: 100  # Gradient accumulation steps
record_epoch: 0  # Save the best only after record epoch

# Test related
no_model_eval: false
test_period: 1

# Logging & TensorBoard
log_per_epoch_count: 20

# DDP & AMP settings
find_unused_parameters: true
use_amp: true

# Optimizer parameters
opt: 'AdamW'
weight_decay: 1e-4
lr: 3e-4
blr: 0.001
min_lr: 1e-5
warmup_epochs: 5

# Device and training control
device: "cuda"
seed: 42
resume: ""
start_epoch: 0
num_workers: 8
pin_mem: true

# Distributed training parameters
world_size: 1
local_rank: -1
dist_on_itp: false
dist_url: "env://"