# ADCD-Net Training Configuration - Optimized for Single V100 GPU
# Memory-optimized version with gradient checkpointing and lite mode
# Reference: https://github.com/KAHIMWONG/ADCD-Net (ICCV 2025)

# DDP - Single GPU
gpus: "0"
flag: train

# Log
log_dir: "./log/doc_adcd_net_v100_train"

# Task
if_predict_label: false
if_predict_mask: true

# Model - Memory optimized configuration
model:
  name: ADCDNet
  init_config:
    cls_n: 2
    # === MEMORY OPTIMIZATION OPTIONS ===
    lite_mode: true                    # Use smaller model (dim=32, fewer blocks)
    use_checkpoint: true               # Gradient checkpointing (saves ~40% memory)
    disable_reconstruction: true       # Disable reconstruction branch (saves ~20% memory)
    disable_focal_loss: false          # Keep focal loss but with reduced samples
    # === Override lite_mode defaults if needed ===
    # restormer_dim: 32                # Base dimension (32 for lite, 48 for full)
    # restormer_blocks: [2, 3, 3, 4]   # Blocks per level (lite mode)
    # loc_out_dim: 64
    # dct_feat_dim: 128
    # focal_in_dim: [128, 64, 64, 64]
    # === Loss weights ===
    ce_weight: 3.0
    rec_weight: 0.0                    # Disabled when disable_reconstruction=true
    focal_weight: 0.2
    norm_weight: 0.1
    docres_ckpt_path: null

# Train dataset
train_dataset:
  name: DocDataset
  dataset_name: DocTamperData_train
  init_config:
    path: /mnt/data1/public_datasets/Doc/DocTamperV1/DocTamperV1-TrainingSet
    dct_path: /mnt/data1/public_datasets/Doc/DataLoaders/other_files/qt_table_ori.pk
    crop_size: 256
    train: true

# Test dataset
test_dataset:
  - name: DocDataset
    dataset_name: DocTamperData_test
    init_config:
      path: /mnt/data1/public_datasets/Doc/DocTamperV1/DocTamperV1-TestingSet
      dct_path: /mnt/data1/public_datasets/Doc/DataLoaders/other_files/qt_table_ori.pk
      train: false

# Transform
transform:
  name: DocTransform
  init_config:
    norm_type: image_net

# Post-processing function for DCT extraction
post_func_name: adcd_net

# Evaluators
evaluator:
  - name: PixelF1
    init_config:
      threshold: 0.5

# === MEMORY-OPTIMIZED TRAINING SETTINGS ===
batch_size: 2                          # Small batch size for V100 16GB
test_batch_size: 2
epochs: 100
accum_iter: 8                          # Gradient accumulation (effective batch = 16)
record_epoch: 0

# Test related
no_model_eval: false
test_period: 5                         # Test less frequently to save time

# Logging
log_per_epoch_count: 10

# DDP & AMP settings
find_unused_parameters: true
use_amp: true                          # Mixed precision (saves ~50% memory)

# Optimizer parameters
opt: 'AdamW'
weight_decay: 1e-4
lr: 1e-4                               # Lower LR for smaller effective batch
blr: 0.001
min_lr: 1e-6
warmup_epochs: 3

# Device and training control
device: "cuda"
seed: 42
resume: ""
start_epoch: 0
num_workers: 4                         # Reduced workers for single GPU
pin_mem: true

# Distributed training parameters (single GPU)
world_size: 1
local_rank: -1
dist_on_itp: false
dist_url: "env://"
